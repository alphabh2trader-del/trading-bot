# Trading Bot — Scheduled Routines
#
# Times are in UTC. GitHub Actions cron is UTC-only (no timezone/DST support).
# ET offset: EDT = UTC-4 (summer), EST = UTC-5 (winter).
#
# DST note (mostly MOOT for the ACTIVE trend_timing_v1 strategy):
# These crons are set for EDT (summer); in winter (EST, ~Nov–Mar) every routine
# fires 1 hour EARLIER in ET. For trend timing this does NOT matter: the only
# trading action is the monthly rebalance in `analysis` (08:00 ET), which submits
# DAY market orders that Alpaca queues for the next open regardless of the exact
# minute. `open` takes no per-day entries under trend timing, so the old winter
# "no entries" problem no longer applies. The `_is_midday()` switch is DST-safe (pytz).
# (Kept for reference in case a per-day intraday strategy is ever reactivated.)
#
# Fix options:
#   (a) In winter, add 1h to the hour of each market-hours cron below AND its
#       matching `startsWith(github.event.schedule, ...)` condition; revert in spring, OR
#   (b) Move the market-hours routines (analysis/plan/open/midday/afternoon/review)
#       into the EST/EDT overlap window 14:30–20:00 UTC so they always land inside
#       market hours year-round (entry time then shifts ~1h seasonally, acceptable
#       for a swing strategy). premarket (07:00 ET) is pre-open and fine in both.
#
# Each job: checkout → setup Python → install deps → run routine → commit memory/ back to repo.
# Committing memory/ ensures the bot's state (trades, config, snapshots) persists across runs.

name: Trading Routines

on:
  schedule:
    # premarket   07:00 ET → 11:00 UTC
    - cron: "0 11 * * 1-5"
    # analysis    08:00 ET → 12:00 UTC
    - cron: "0 12 * * 1-5"
    # plan        09:00 ET → 13:00 UTC
    - cron: "0 13 * * 1-5"
    # open        09:35 ET → 13:35 UTC
    - cron: "35 13 * * 1-5"
    # midday      10:30 ET → 14:30 UTC
    - cron: "30 14 * * 1-5"
    # afternoon   14:00 ET → 18:00 UTC
    - cron: "0 18 * * 1-5"
    # review      16:00 ET → 20:00 UTC  (learning + adaptive adjustment runs here)
    - cron: "0 20 * * 1-5"
    # weekly      Saturday 10:00 ET → 14:00 UTC
    - cron: "0 14 * * 6"
  workflow_dispatch:
    inputs:
      routine:
        description: "Routine to run manually"
        required: true
        type: choice
        options:
          - premarket
          - analysis
          - plan
          - open
          - midday
          - afternoon
          - review
          - weekly
          - reset

permissions:
  contents: write

jobs:
  # ---------- premarket ----------
  premarket:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.routine == 'premarket' || github.event_name == 'schedule' && startsWith(github.event.schedule, '0 11')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run premarket
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRADING_MODE: ${{ secrets.TRADING_MODE }}
        run: python runner.py --routine premarket
      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import os, urllib.request, json
          token = os.environ.get('TELEGRAM_BOT_TOKEN', '')
          chat = os.environ.get('TELEGRAM_CHAT_ID', '')
          if not token or not chat:
              exit(0)
          data = json.dumps({'chat_id': chat, 'text': 'ERROR: premarket routine failed on GitHub Actions'}).encode()
          req = urllib.request.Request('https://api.telegram.org/bot' + token + '/sendMessage', data=data, headers={'Content-Type': 'application/json'})
          try: urllib.request.urlopen(req, timeout=10)
          except: pass
          "
      - name: Save memory to repo
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@trading"
          git add memory/
          if git diff --cached --quiet; then echo "No memory changes"; exit 0; fi
          git commit -m "chore: premarket memory update $(date -u +%Y-%m-%dT%H:%M)"
          for i in 1 2 3; do
            git push && break
            echo "push rejected — rebasing on origin/main and retrying ($i)"
            git pull --rebase --autostash origin main || true
            sleep 3
          done

